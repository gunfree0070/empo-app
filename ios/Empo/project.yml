name: Empo
packages:
  GameProbe:
    path: ../GameProbe
options:
  bundleIdPrefix: sh.mateo
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: 0.2.13
    CURRENT_PROJECT_VERSION: 451
    CLANG_CXX_LANGUAGE_STANDARD: c++14
    # `YES` / `NO` are Xcode's canonical boolean tokens for build
    # settings; xcodebuild's parser treats them specially. yamllint
    # would prefer lower-case, but lowercasing here risks subtle
    # parser quirks downstream, so disable the rule for these lines.
    CLANG_ENABLE_OBJC_ARC: YES # yamllint disable-line rule:truthy
    CLANG_ENABLE_MODULES: NO # yamllint disable-line rule:truthy
    OTHER_CFLAGS: -fdeclspec
    # Folded scalar (`>-`) collapses newlines into single spaces so
    # the resulting build setting is one whitespace-separated string,
    # matching what xcodebuild expects for `WARNING_CFLAGS`. Listing
    # one flag per line keeps the diff readable when toggling them.
    WARNING_CFLAGS: >-
      -Wno-documentation
      -Wno-shorten-64-to-32
      -Wno-deprecated-declarations
      -Wno-uninitialized
      -Wno-conditional-uninitialized
      -Wno-undefined-var-template
      -Wno-comma
      -Wno-switch
      -Wno-unused-const-variable
      -Wno-deprecated-literal-operator
      -Wno-unused-function
    DEPENDENCY_SEARCH_PATH: $(PROJECT_DIR)/../Dependencies/build-$(PLATFORM_NAME)-arm64
    HEADER_SEARCH_PATHS:
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/audio
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/crypto
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/display
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/display/gl
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/display/libnsgif
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/etc
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/filesystem
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/input
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/net
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/system
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/theoraplay
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/util
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/binding
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/shader
      # H-Mode7 port (//hmode7-apple-mobile submodule). Headers live
      # next to the .cpp sources; the binding layer includes them via
      # short names (hm7_apply_opacity.h etc.).
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/hmode7/src
      - $(PROJECT_DIR)/shims
      - $(PROJECT_DIR)/shims/libarchive
      # Vendored libmspack (CAB reader for self-extracting .exe game
      # installers). Its sources use angled includes (<mspack.h>).
      - $(PROJECT_DIR)/vendor/libmspack
      # Ruby 3.1 headers live under /include/ruby31/ now (Phase D
      # header isolation, MULTI_RUBY_PLAN.md). Keep this AHEAD of
      # the global $(DEPENDENCY_SEARCH_PATH)/include in
      # SYSTEM_HEADER_SEARCH_PATHS below so Ruby resolves to 3.1
      # for the legacy direct-link path. Once the legacy path is
      # dropped (Phase F), this line and the SYSTEM_HEADER_SEARCH_PATHS
      # entry both go away — only the per-Ruby merged.o targets
      # need Ruby headers.
      - $(DEPENDENCY_SEARCH_PATH)/include/ruby31
      - $(DEPENDENCY_SEARCH_PATH)/include/SDL2
      - $(DEPENDENCY_SEARCH_PATH)/include/pixman-1
      - $(DEPENDENCY_SEARCH_PATH)/include/uchardet
      - $(DEPENDENCY_SEARCH_PATH)/include/freetype2
      - $(PROJECT_DIR)/../Dependencies/ANGLE/$(PLATFORM_NAME)/include
    SYSTEM_HEADER_SEARCH_PATHS:
      - $(DEPENDENCY_SEARCH_PATH)/include
    FRAMEWORK_SEARCH_PATHS: []
    LIBRARY_SEARCH_PATHS:
      - $(DEPENDENCY_SEARCH_PATH)/lib
      - $(PROJECT_DIR)/../Dependencies/ANGLE/$(PLATFORM_NAME)/lib
    GCC_PREPROCESSOR_DEFINITIONS:
      - MKXPZ_BUILD_XCODE
      # Forward-decl helper for ALCdevice. Apple's <OpenAL/alc.h>
      # named the struct `ALCdevice_struct`; OpenAL-Soft's
      # <AL/alc.h> names it just `ALCdevice`. We're on OpenAL-Soft.
      - MKXPZ_ALCDEVICE=ALCdevice
      - 'MKXPZ_VERSION="\"1.0.0\""'
      - 'MKXPZ_GIT_HASH="\"ios\""'
      - 'MKXPZ_RUBY_VERSION="\"3.1\""'
      # TLS for the in-engine HTTP client (src/net/net.cpp). NOT the
      # upstream MKXPZ_SSL flag - that one also toggles xBRZ shader
      # paths we don't build; see the comment in net.cpp.
      - MKXPZ_NET_TLS
      - MKXPZ_HAVE_SYNTAX_TRANSFORM_PATCHES
      - GLES2_HEADER
      - MKXPZ_HAS_ANGLE
      - HAVE_CONFIG_H
      # Selects the real mkxp-z Bitmap/Table/Ruby wrappers in
      # hmode7-apple-mobile/src/hm7_bindings.cpp. Without this the
      # file compiles the unit-test stub path (returns nullptr for
      # everything), which would make the renderer produce no
      # output despite the binding being registered.
      - HM7_HAVE_MKXP_BITMAP
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES # yamllint disable-line rule:truthy
  configs:
    Debug:
      # Local device installs: use a dev bundle ID a personal team can
      # register. Override in the gitignored Signing.xcconfig if needed.
      PRODUCT_BUNDLE_IDENTIFIER: sh.mateo.empo.dev
      ENABLE_TESTABILITY: YES # yamllint disable-line rule:truthy
    Release:
      OTHER_CFLAGS: "-fdeclspec -O3"
      PRODUCT_BUNDLE_IDENTIFIER: sh.mateo.empo
targets:
  Empo:
    type: application
    platform: iOS
    preBuildScripts:
      - name: Hydrate ANGLE prebuilt libs
        # ANGLE static libs (~80 MB) are not tracked in git. They live
        # as a release artifact on the empo-deps repo, pinned by version
        # in `ios/Dependencies/ANGLE/.version`. This phase fetches the
        # tarball on first build and skips when a stamp file matches the
        # pinned version. See tools/fetch-angle.sh for details.
        basedOnDependencyAnalysis: false
        script: |
          "${PROJECT_DIR}/../../tools/fetch-angle.sh"

      - name: Hydrate native dependency trees
        # OpenSSL/SDL/Ruby/mkxp-merged trees (~hundreds of MB) are not
        # built during normal Xcode iteration. They are prebuilt per SDK
        # on empo-deps (or built locally once via
        # scripts/rebuild-all-native-deps.sh). See tools/fetch-native-deps.sh.
        basedOnDependencyAnalysis: false
        script: |
          "${PROJECT_DIR}/../../tools/fetch-native-deps.sh"

      - name: Verify native deps for active SDK
        # Fail fast when the tree for the current destination (device or
        # simulator) is missing or platform-contaminated. See
        # scripts/verify-native-deps.sh.
        basedOnDependencyAnalysis: false
        script: |
          set -e
          PLATFORM_NAME="${PLATFORM_NAME}" \
            "${PROJECT_DIR}/../../scripts/verify-native-deps.sh"

      - name: Assemble Assets.bundle
        # Force every build. The script globs the engine's shader/font/
        # script directories and copies whatever is there, so declaring
        # a static outputFiles list would drift out of date and silently
        # drop newly-added assets.
        basedOnDependencyAnalysis: false
        script: |
          ENGINE="${PROJECT_DIR}/../../mkxp-z-apple-mobile"
          BUNDLE="${PROJECT_DIR}/Assets.bundle"

          # Shaders
          mkdir -p "$BUNDLE/Shaders"
          cp "$ENGINE"/shader/*.frag "$BUNDLE/Shaders/" 2>/dev/null || true
          cp "$ENGINE"/shader/*.vert "$BUNDLE/Shaders/" 2>/dev/null || true
          cp "$ENGINE"/shader/*.h    "$BUNDLE/Shaders/" 2>/dev/null || true

          # Fonts
          mkdir -p "$BUNDLE/Fonts"
          cp "$ENGINE"/assets/liberation.ttf   "$BUNDLE/Fonts/"
          cp "$ENGINE"/assets/wqymicrohei.ttf  "$BUNDLE/Fonts/"

          # Loose assets
          cp "$ENGINE"/assets/gamecontrollerdb.txt "$BUNDLE/"
          cp "$ENGINE"/assets/icon.png             "$BUNDLE/"
          # Mozilla CA root bundle: TLS trust store for the native
          # HTTP client and Ruby's openssl (via SSL_CERT_FILE).
          cp "$ENGINE"/assets/cacert.pem           "$BUNDLE/"

          # Preload scripts
          mkdir -p "$BUNDLE/Preload"
          cp "$ENGINE"/scripts/preload/*.rb "$BUNDLE/Preload/"

          # Postload scripts
          mkdir -p "$BUNDLE/Postload"
          cp "$ENGINE"/scripts/postload/*.rb "$BUNDLE/Postload/"

          # Curated game patches.
          # Mirror layout (gameRegistry.json + _global/ + per-game
          # subdirs) into the bundle so the runtime can resolve a
          # canonical id from the game's manifest/Game.ini and write
          # the merged patches.json into the game folder at launch.
          # See ios/Empo/curated-patches/gameRegistry.json for the
          # registry schema and `src/Library/PatcherDistribution.swift`
          # (Empo) for the resolver + writer.
          rm -rf "$BUNDLE/Patches"
          mkdir -p "$BUNDLE/Patches"
          cp -R "${PROJECT_DIR}/curated-patches/"* "$BUNDLE/Patches/"

          # Splash background icon pack. Pixelated 16x16 SVGs that
          # the splash's PixelDitherPattern picks N random ones from
          # each launch instead of the historical hand-coded
          # circle/cross/diamond shapes. See `src/Design/SplashIcons.swift`
          # for the loader + parser and RootView.swift for the
          # consumer.
          rm -rf "$BUNDLE/SplashIcons"
          mkdir -p "$BUNDLE/SplashIcons"
          cp "${PROJECT_DIR}/curated-splash-icons/"*.svg "$BUNDLE/SplashIcons/"
      - name: Assemble Ruby stdlib
        # Pure-Ruby stdlib subsets from the prebuilt dep tree, landing
        # at Empo.app/Ruby/{3.1.0,1.9.1,1.8}. The engine pushes the
        # per-VM directory onto $LOAD_PATH (binding-mri.cpp), which is
        # what makes `require 'net/http'` etc. resolve in games.
        # Force every build: content follows the fetched deps version,
        # not any file Xcode tracks.
        basedOnDependencyAnalysis: false
        script: |
          set -e
          STDLIB_SRC="${PROJECT_DIR}/../Dependencies/build-${PLATFORM_NAME}-arm64/ruby-stdlib"
          if [ ! -d "$STDLIB_SRC" ]; then
            echo "error: $STDLIB_SRC missing - run: cd ios/Dependencies && make -f ${PLATFORM_NAME}.make ruby-stdlib (or refetch native deps)" >&2
            exit 1
          fi
          rsync -a --delete "$STDLIB_SRC/" "${PROJECT_DIR}/Ruby/"
      - name: Generate Git Info
        # Force this script to run every build. Without this, Xcode sees
        # the declared output file already on disk and skips the script,
        # so changing a branch / commit / dirty state wouldn't be
        # reflected in the app until a clean build.
        basedOnDependencyAnalysis: false
        # Register the generated Swift file with the target. It's
        # gitignored so the `src` group scan won't pick it up; without
        # this + the explicit source entry below, Release builds fail
        # with "Cannot find 'GitInfo' in scope".
        outputFiles:
          - $(PROJECT_DIR)/src/App/GitInfo.generated.swift
        script: |
          REPO="${PROJECT_DIR}/../.."
          COMMIT=$(git -C "$REPO" rev-parse --short HEAD 2>/dev/null || echo "unknown")
          if git -C "$REPO" diff --quiet HEAD 2>/dev/null; then DIRTY="false"; else DIRTY="true"; fi
          BRANCH=$(git -C "$REPO" symbolic-ref --quiet --short HEAD 2>/dev/null || echo "")
          DEFAULT_BRANCH=$(git -C "$REPO" symbolic-ref --quiet --short refs/remotes/origin/HEAD 2>/dev/null | sed 's|^origin/||' || echo "main")
          [ -z "$DEFAULT_BRANCH" ] && DEFAULT_BRANCH="main"

          # Normalise the git remote URL into an HTTPS web URL so the
          # app can link into the project (issues page, repo home, etc.)
          # without hardcoding the org/repo. Handles both SSH-style
          # (`git@github.com:org/repo.git`) and HTTPS origins, and
          # strips the `.git` suffix that show up in clones.
          ORIGIN_RAW=$(git -C "$REPO" config --get remote.origin.url 2>/dev/null || echo "")
          case "$ORIGIN_RAW" in
            git@github.com:*) ORIGIN_URL="https://github.com/${ORIGIN_RAW#git@github.com:}" ;;
            ssh://git@github.com/*) ORIGIN_URL="https://github.com/${ORIGIN_RAW#ssh://git@github.com/}" ;;
            *) ORIGIN_URL="$ORIGIN_RAW" ;;
          esac
          ORIGIN_URL="${ORIGIN_URL%.git}"
          # Fall back to the marketing homepage if no origin is set
          # (e.g. a fresh checkout used as a vendored source).
          [ -z "$ORIGIN_URL" ] && ORIGIN_URL="https://github.com/mateo-m/empo-app"
          ISSUES_URL="$ORIGIN_URL/issues"

          # Engine binding fingerprint for the active SDK. The debug log
          # prints it next to the commit so a stale mkxp*-merged.o is
          # visible in bug reports: the app can be built from HEAD while
          # the prebuilt engine inside it is weeks older (the July 2026
          # stale-msgbox bug). 12 hex chars is enough to compare against
          # ios/Dependencies/tools/binding-fingerprint.sh output.
          FP_FILE="${PROJECT_DIR}/../Dependencies/build-${PLATFORM_NAME}-arm64/lib/.mkxp-binding-fingerprint"
          ENGINE_FP=$(head -c 12 "$FP_FILE" 2>/dev/null || true)
          [ -z "$ENGINE_FP" ] && ENGINE_FP="unstamped"

          OUT="${PROJECT_DIR}/src/App/GitInfo.generated.swift"
          NEW=$(
            echo "// Auto-generated by build script — do not edit"
            echo "enum GitInfo {"
            echo "    static let commit = \"$COMMIT\""
            echo "    static let dirty = $DIRTY"
            echo "    static let branch = \"$BRANCH\""
            echo "    static let defaultBranch = \"$DEFAULT_BRANCH\""
            echo "    static let originURL = \"$ORIGIN_URL\""
            echo "    static let issuesURL = \"$ISSUES_URL\""
            echo "    static let engineFingerprint = \"$ENGINE_FP\""
            echo "}"
          )
          # Only touch the file when the content actually changed so
          # downstream Swift compilation isn't invalidated on every
          # build when nothing relevant has shifted.
          if [ ! -f "$OUT" ] || [ "$(cat "$OUT")" != "$NEW" ]; then
            echo "$NEW" > "$OUT"
          fi
    sources:
      - path: ../../mkxp-z-apple-mobile/src/main.cpp
      - path: ../../mkxp-z-apple-mobile/src/eventthread.cpp
      - path: ../../mkxp-z-apple-mobile/src/sharedstate.cpp
      - path: ../../mkxp-z-apple-mobile/src/patcher.cpp
      - path: ../../mkxp-z-apple-mobile/src/config.cpp
      - path: ../../mkxp-z-apple-mobile/src/crypto/rgssad.cpp
      - path: ../../mkxp-z-apple-mobile/src/util/iniconfig.cpp
      - path: ../../mkxp-z-apple-mobile/src/filesystem/filesystem.cpp
      - path: ../../mkxp-z-apple-mobile/src/input/input.cpp
      - path: ../../mkxp-z-apple-mobile/src/input/keybindings.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/audio.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/audiostream.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/alstream.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/soundemitter.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/sdlsoundsource.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/vorbissource.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/midisource.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/fluid-fun.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/graphics.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/movie.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/bitmap.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/font.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/sprite.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/plane.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/viewport.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/window.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/windowvx.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/tilemap.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/tilemapvx.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/autotiles.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/autotilesvx.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/shader.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/glstate.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/gl-fun.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/gl-meta.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/gl-debug.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/vertex.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/scene.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/texpool.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/tileatlas.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/tileatlasvx.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/tilequad.cpp
      - path: ../../mkxp-z-apple-mobile/src/etc/etc.cpp
      - path: ../../mkxp-z-apple-mobile/src/etc/table.cpp
      - path: ../../mkxp-z-apple-mobile/src/net/net.cpp
      - path: ../../mkxp-z-apple-mobile/src/net/LUrlParser.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/libnsgif/libnsgif.c
      - path: ../../mkxp-z-apple-mobile/src/display/libnsgif/lzw.c
      - path: ../../mkxp-z-apple-mobile/src/theoraplay/theoraplay.c
      # mkxp-z's binding/*.cpp + hmode7/*.cpp (all Ruby-API users)
      # are NOT compiled here. Multi-Ruby Phase D (MULTI_RUBY_PLAN.md)
      # compiles them per-Ruby-version inside ios/Dependencies/common.make's
      # mkxp30-merged / mkxp31-merged targets. Each version's libruby +
      # binding code merges into a single relocatable .o via `ld -r`
      # with Ruby symbols hidden via the unexport list. The merged
      # .o files are linked below in OTHER_LDFLAGS.
      - path: ../../mkxp-z-apple-mobile/src/app_bridge.cpp
      - path: ../../mkxp-z-apple-mobile/src/ios_fatal_report.mm
      - path: ../../mkxp-z-apple-mobile/src/angle_native_layer.mm
      # Vendored libmspack CAB reader (see vendor/libmspack/README.md).
      # The project-wide HAVE_CONFIG_H (meant for mkxp-z) must not leak
      # into libmspack, whose sources would otherwise include mkxp-z's
      # C++ config.h.
      - path: vendor/libmspack
        type: group
        compilerFlags: -UHAVE_CONFIG_H
      - path: src
        type: group
      # Gitignored generated file; listed explicitly so xcodegen keeps
      # it in Compile Sources after `src` group scans skip ignored paths.
      - path: src/App/GitInfo.generated.swift
        optional: true
      - path: PrivacyInfo.xcprivacy
      - path: Assets.xcassets
      - path: Assets.bundle
        type: folder
        buildPhase: resources
      # Populated by the "Assemble Ruby stdlib" script phase from the
      # prebuilt dep tree; gitignored (content is versioned by the
      # native-deps pin, not this repo).
      - path: Ruby
        type: folder
        buildPhase: resources
        optional: true
    # Code signing is configured via a local, untracked xcconfig
    # (Signing.xcconfig in this directory) so each machine can set
    # DEVELOPMENT_TEAM and optionally override PRODUCT_BUNDLE_IDENTIFIER
    # without touching the project file. See Signing.xcconfig.example.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        INFOPLIST_FILE: $(PROJECT_DIR)/Info.plist
        PRODUCT_NAME: Empo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        # Empty entitlements file by design: the app has no special
        # capabilities, but having SOME .entitlements file in the
        # build means the signed binary always has an entitlements
        # blob present. Naive resigners (notably ESign) read this
        # blob as their template; without it they synthesize an
        # incomplete blob that breaks document picker's sandbox-
        # extension grants on the picked URL (Open does nothing for
        # files, spinner-forever for folders). Sideloadly + AltStore
        # synthesize correctly so they work regardless, but shipping
        # an explicit file unblocks ESign too.
        CODE_SIGN_ENTITLEMENTS: Empo.entitlements
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/src/Empo-Bridging-Header.h
        OTHER_LDFLAGS:
          - -lSDL2
          - -lSDL2main
          - -lSDL2_image
          - -lSDL2_sound
          - -lSDL2_ttf
          # Ruby static libs (1.8 / 1.9 / 3.1) are linked indirectly
          # via the per-version mkxpNN-merged.o files below in
          # OTHER_LDFLAGS. Their symbols are private-extern inside
          # those merged .o's, so versions don't clash on `_rb_*`.
          - -lfreetype
          - -lpixman-1
          - -lpng16
          - -logg
          - -lvorbis
          - -lvorbisfile
          - -ltheora
          - -ltheoradec
          - -lphysfs
          - -luchardet
          - -lz
          - -lbz2
          - -liconv
          - -larchive
          # OpenAL-Soft static lib (replaces Apple's deprecated
          # `-framework OpenAL`). Must precede system libs so the
          # static archive is searched before any system fallback.
          - -lopenal
          # Multi-Ruby Phase D: per-version binding+libruby merged
          # objects, one per supported Ruby (1.8 / 1.9 / 3.1).
          # Each exposes a single `_mkxp_get_script_binding_<NN>()`
          # entry; everything else (libruby's `_rb_*` + mkxp-z
          # binding internals) is private-extern, hidden inside the
          # merged .o so versions coexist without symbol clashes.
          # Native Ruby 3.0 was dropped: the syntax-transform parser
          # patches only exist in the 3.1 source, so 3.0 + Legacy
          # compat was a silent no-op. Auto-detect now folds
          # 3.0-bundling games (Pokemon Essentials forks shipping
          # `x64-msvcrt-ruby300.dll`) onto 3.1 + Legacy.
          #
          # `binding.h`'s `getActiveScriptBinding()` dispatches at
          # runtime based on the host's `mkxp_setActiveRubyVersion()`
          # setting (per-game detection in RubyVersionDetection.swift).
          # Default + UNSET fall through to 3.1, matching the legacy
          # behaviour before multi-Ruby. Adding 1.9 / 1.8 is a
          # mechanical extension — drop the new merged.o here, add
          # the case in `getActiveScriptBinding()`.
          - $(DEPENDENCY_SEARCH_PATH)/lib/mkxp18-merged.o
          - $(DEPENDENCY_SEARCH_PATH)/lib/mkxp19-merged.o
          - $(DEPENDENCY_SEARCH_PATH)/lib/mkxp31-merged.o
          - -lssl
          - -lcrypto
          - -ldl
          - -lpthread
          - -framework Foundation
          - -framework UIKit
          - -framework CoreFoundation
          - -framework CoreGraphics
          - -framework CoreVideo
          - -framework CoreAudio
          - -framework AudioToolbox
          - -framework AVFoundation
          - -framework Metal
          - -framework QuartzCore
          - -framework GameController
          - -framework CoreMotion
          - -weak_framework CoreBluetooth
          - -weak_framework CoreHaptics
          - -lANGLE_static
          - -lEGL_static
          - -lGLESv2_static
    dependencies:
      - package: GameProbe
schemes:
  Empo:
    build:
      targets:
        Empo: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
