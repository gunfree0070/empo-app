pre-commit:
  parallel: false
  commands:
    block-detached-head:
      run: "git symbolic-ref -q HEAD >/dev/null || { printf 'pre-commit failed: refusing commit on detached HEAD\n' >&2; exit 1; }"
    checks:
      run: scripts/hooks/pre-commit.sh

pre-push:
  parallel: false
  commands:
    submodule-dev-check:
      run: scripts/hooks/pre-push.sh
