name: Sync AltStore Source

on:
  release:
    types: [published, edited, unpublished, deleted]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to resync (for example v0.1.0)
        required: true
        type: string

# Several pinned actions (actions/checkout, oven-sh/setup-bun) still
# run on Node.js 20. GitHub is forcing all JS actions to Node.js 24
# from 2026-06-02; opt in now so the deprecation banner is silenced
# and we don't get a surprise breakage when the cutover lands. Drop
# this once every action we pin ships a Node.js 24 release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: altstore-source-${{ github.event.release.tag_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  sync:
    name: Update altstore-source.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Resolve target release
        env:
          RELEASE_ACTION: ${{ github.event.action }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          DISPATCH_TAG_NAME: ${{ github.event.inputs.tag }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              TAG_NAME="$DISPATCH_TAG_NAME"
              SYNC_ACTION="workflow_dispatch"
          else
              TAG_NAME="$RELEASE_TAG_NAME"
              SYNC_ACTION="$RELEASE_ACTION"
          fi

          case "$TAG_NAME" in
              v*) ;;
              *) TAG_NAME="v$TAG_NAME" ;;
          esac

          VERSION="${TAG_NAME#v}"

          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SYNC_ACTION=$SYNC_ACTION" >> "$GITHUB_ENV"

      - name: Fetch release metadata
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event.action != 'deleted' && github.event.action != 'unpublished') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" > release.json
          else
              jq '.release' "$GITHUB_EVENT_PATH" > release.json
          fi

          RELEASE_TAG=$(jq -r '.tag_name // empty' release.json)
          if [ -z "$RELEASE_TAG" ]; then
              echo "::error::Could not resolve release metadata for $TAG_NAME"
              exit 1
          fi

          if [ "$RELEASE_TAG" != "$TAG_NAME" ]; then
              echo "::error::Resolved release tag $RELEASE_TAG does not match expected tag $TAG_NAME"
              exit 1
          fi

      - name: Sync release metadata into AltStore source
        run: |
          if [ "$SYNC_ACTION" = "deleted" ] || [ "$SYNC_ACTION" = "unpublished" ]; then
              bun scripts/update-altstore-source.ts \
                  --version "$VERSION" \
                  --remove
              exit 0
          fi

          RELEASE_TIMESTAMP=$(jq -r '.published_at // .created_at // empty' release.json)
          RELEASE_DATE="${RELEASE_TIMESTAMP%%T*}"
          RELEASE_BODY=$(jq -r '.body // ""' release.json)
          IPA_NAME=$(jq -r 'first(.assets[] | select(.name | test("^Empo-.*-unsigned\\.ipa$")) | .name) // empty' release.json)
          IPA_URL=$(jq -r 'first(.assets[] | select(.name | test("^Empo-.*-unsigned\\.ipa$")) | .browser_download_url) // empty' release.json)
          IPA_SIZE=$(jq -r 'first(.assets[] | select(.name | test("^Empo-.*-unsigned\\.ipa$")) | .size) // empty' release.json)

          if [ -z "$RELEASE_DATE" ]; then
              echo "::error::Release is missing a publish or creation timestamp"
              exit 1
          fi

          if [ -z "$IPA_NAME" ] || [ -z "$IPA_URL" ] || [ -z "$IPA_SIZE" ]; then
              echo "::error::Release is missing an Empo unsigned IPA asset"
              exit 1
          fi

          MARKETING_VERSION=$(git show "$TAG_NAME:ios/Empo/project.yml" | awk -F': ' '/MARKETING_VERSION:/ { print $2; exit }')
          BUILD_VERSION=$(git show "$TAG_NAME:ios/Empo/project.yml" | awk -F': ' '/CURRENT_PROJECT_VERSION:/ { print $2; exit }')

          if [ -z "$BUILD_VERSION" ]; then
              echo "::error::Could not read CURRENT_PROJECT_VERSION from $TAG_NAME:ios/Empo/project.yml"
              exit 1
          fi

          if [ "$MARKETING_VERSION" != "$VERSION" ]; then
              echo "::error::Release tag $TAG_NAME does not match MARKETING_VERSION $MARKETING_VERSION"
              exit 1
          fi

          EXISTING_DESCRIPTION=$(jq -r --arg version "$VERSION" 'first(.apps[0].versions[] | select(.version == $version) | .localizedDescription) // empty' altstore-source.json)

          # On initial publish, prefer the description already committed
          # with the release tag; the local release script writes the raw
          # changelog there before the GitHub release exists. On manual
          # resync or release edit, the GitHub release body becomes the
          # source of truth so note edits propagate into the manifest.
          DESCRIPTION=""
          if [ "$SYNC_ACTION" = "published" ] && [ -n "$EXISTING_DESCRIPTION" ]; then
              DESCRIPTION="$EXISTING_DESCRIPTION"
          fi
          if [ -z "$DESCRIPTION" ] && [ -n "$RELEASE_BODY" ]; then
              DESCRIPTION="$RELEASE_BODY"
          fi
          if [ -z "$DESCRIPTION" ] && [ -n "$EXISTING_DESCRIPTION" ]; then
              DESCRIPTION="$EXISTING_DESCRIPTION"
          fi
          if [ -z "$DESCRIPTION" ]; then
              DESCRIPTION="See commit history for changes."
          fi

          bun scripts/update-altstore-source.ts \
              --version "$VERSION" \
              --build "$BUILD_VERSION" \
              --size "$IPA_SIZE" \
              --date "$RELEASE_DATE" \
              --download-url "$IPA_URL" \
              --description "$DESCRIPTION"

      - name: Commit manifest update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- altstore-source.json; then
              echo "altstore-source.json already matches release metadata"
              exit 0
          fi

          case "$SYNC_ACTION" in
              deleted | unpublished)
                  COMMIT_SUBJECT="chore: remove AltStore source entry for $TAG_NAME"
                  PR_BODY="GitHub release \`$TAG_NAME\` was $SYNC_ACTION, so this removes its entry from \`altstore-source.json\`."
                  BRANCH_PREFIX="remove"
                  ;;
              workflow_dispatch)
                  COMMIT_SUBJECT="chore: resync AltStore source for $TAG_NAME"
                  PR_BODY="Manual AltStore manifest resync for \`$TAG_NAME\`."
                  BRANCH_PREFIX="resync"
                  ;;
              *)
                  COMMIT_SUBJECT="chore: sync AltStore source for $TAG_NAME"
                  PR_BODY="GitHub release \`$TAG_NAME\` was $SYNC_ACTION, so this syncs \`altstore-source.json\` to the current release metadata."
                  BRANCH_PREFIX="sync"
                  ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          git commit -m "$COMMIT_SUBJECT"

          if git push origin HEAD:main; then
              echo "pushed altstore-source.json update directly to main"
              exit 0
          fi

          SAFE_TAG=$(printf '%s' "$TAG_NAME" | tr -cs 'A-Za-z0-9._-' '-')
          SAFE_TAG=${SAFE_TAG#-}
          SAFE_TAG=${SAFE_TAG%-}
          FALLBACK_BRANCH="automation/altstore-source-$BRANCH_PREFIX-$SAFE_TAG-$GITHUB_RUN_ID"

          git switch -c "$FALLBACK_BRANCH"
          git push --set-upstream origin "$FALLBACK_BRANCH"

          PR_URL=$(gh pr create \
              --base main \
              --head "$FALLBACK_BRANCH" \
              --title "$COMMIT_SUBJECT" \
              --body "$PR_BODY")

          echo "direct push to main failed; opened PR instead: $PR_URL"
